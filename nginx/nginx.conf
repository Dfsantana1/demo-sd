events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Pool de nodos (Round-Robin automático) ───────────────────────────────
    upstream api_pool {
        server api-1:3001;
        server api-2:3001;
        server api-3:3001;
    }

    server {
        listen 80;

        # ── Rutas directas a cada nodo (para el monitor de salud) ─────────────
        location /api/node/1/ {
            rewrite ^/api/node/1/(.*)$ /api/$1 break;
            proxy_pass http://api-1:3001;
            proxy_set_header Host $host;
        }

        location /api/node/2/ {
            rewrite ^/api/node/2/(.*)$ /api/$1 break;
            proxy_pass http://api-2:3001;
            proxy_set_header Host $host;
        }

        location /api/node/3/ {
            rewrite ^/api/node/3/(.*)$ /api/$1 break;
            proxy_pass http://api-3:3001;
            proxy_set_header Host $host;
        }

        # ── SSE — requiere desactivar buffering para streaming ─────────────────
        location /api/events {
            proxy_pass         http://api_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection '';
            proxy_set_header   Host $host;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }

        # ── API general (load balancer round-robin) ────────────────────────────
        location /api/ {
            proxy_pass       http://api_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Dashboard estático ─────────────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}
